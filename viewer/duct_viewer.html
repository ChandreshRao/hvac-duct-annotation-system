<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HVAC Duct Annotation Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --border: #1a2744;
    --low: #10B981;
    --medium: #F59E0B;
    --high: #EF4444;
    --text: #cbd5e1;
    --dim: #475569;
    --accent: #3B82F6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }
  #topbar .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    white-space: nowrap;
  }
  #topbar .sep { width: 1px; height: 24px; background: var(--border); }

  .pill-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill-btn:hover, .pill-btn.active {
    border-color: var(--accent);
    color: #93C5FD;
    background: #1e3a5f33;
  }

  #upload-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 5px 14px;
    border-radius: 3px;
    border: 1px solid var(--accent);
    background: #1e3a5f33;
    color: #93C5FD;
    cursor: pointer;
    white-space: nowrap;
  }
  #upload-label:hover { background: #1e3a5f66; }
  #file-input { display: none; }

  .legend {
    display: flex;
    gap: 14px;
    margin-left: auto;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  #status-bar {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* ── MAIN ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── CANVAS AREA ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: auto;
    background:
      radial-gradient(ellipse at 20% 20%, #1e3a5f18 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1a274411 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1a274411 40px),
      var(--bg);
  }

  #canvas-container {
    position: relative;
    display: inline-block;
  }

  #pdf-canvas {
    display: block;
  }

  #svg-overlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  #svg-overlay .duct-group {
    pointer-events: all;
    cursor: crosshair;
  }

  /* ── DROP ZONE ── */
  #dropzone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #dropzone .dz-icon { font-size: 48px; opacity: 0.3; }
  #dropzone .dz-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--dim);
  }
  #dropzone .dz-sub {
    font-size: 11px;
    color: #334155;
    letter-spacing: 1px;
  }
  #dropzone.hidden { display: none; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.15s, transform 0.15s;
    min-width: 180px;
  }
  #tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .tt-inner {
    background: #0a0e14ee;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px #00000088;
  }
  .tt-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: #f1f5f9;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .tt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 4px;
  }
  .tt-key {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
  }
  .tt-val {
    font-size: 11px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
  }
  .tt-pressure {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 700;
  }
  .tt-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }
  .tt-source {
    font-size: 9px;
    color: #334155;
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── SIDE PANEL ── */
  #side-panel {
    width: 260px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .duct-count {
    background: #1e3a5f;
    color: #93C5FD;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
  }

  #duct-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #duct-list::-webkit-scrollbar { width: 4px; }
  #duct-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .duct-item {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .duct-item:hover, .duct-item.active {
    border-color: var(--accent);
    background: #1e3a5f22;
  }
  .duct-item .di-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .duct-item .di-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #e2e8f0;
    flex: 1;
  }
  .duct-item .di-pressure {
    font-size: 9px;
    letter-spacing: 1px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #0a0e14cc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    gap: 16px;
    backdrop-filter: blur(4px);
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
  }

  /* ── PULSE ANIMATION for duct lines ── */
  @keyframes dash-march {
    to { stroke-dashoffset: -20; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">HVAC // DUCT VIEWER</div>
  <div class="sep"></div>
  <label id="upload-label" for="file-input">⊕ UPLOAD PDF</label>
  <input type="file" id="file-input" accept=".pdf"/>
  <div class="sep"></div>
  <button class="pill-btn active" id="btn-all" onclick="filterDucts('all')">ALL</button>
  <button class="pill-btn" id="btn-low" onclick="filterDucts('LOW')">LOW</button>
  <button class="pill-btn" id="btn-med" onclick="filterDucts('MEDIUM')">MEDIUM</button>
  <button class="pill-btn" id="btn-high" onclick="filterDucts('HIGH')">HIGH</button>
  <button class="pill-btn" id="btn-manual" onclick="toggleManualMode()">MANUAL OFF</button>
  <button class="pill-btn" id="btn-manual-reload" onclick="reloadManualAnnotations()">RELOAD SAVED</button>
  <div class="sep"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--low)"></div>LOW</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--medium)"></div>MEDIUM</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--high)"></div>HIGH</div>
  </div>
  <div class="sep"></div>
  <div id="status-bar">NO FILE LOADED</div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <svg id="svg-overlay"></svg>
    </div>

    <div id="dropzone">
      <div class="dz-icon">⊞</div>
      <div class="dz-title">DROP PDF HERE</div>
      <div class="dz-sub">OR USE UPLOAD BUTTON ABOVE</div>
      <div class="dz-sub" style="margin-top:8px; color:#1e3a5f">
        Overlay appears after API annotation completes
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div id="side-panel">
    <div class="panel-header">
      DETECTED DUCTS
      <span class="duct-count" id="duct-count">0</span>
    </div>
    <div id="duct-list"></div>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-inner">
    <div class="tt-label" id="tt-label">—</div>
    <div class="tt-divider"></div>
    <div class="tt-row">
      <span class="tt-key">PRESSURE</span>
      <span class="tt-pressure" id="tt-pressure">—</span>
    </div>
    <div class="tt-row">
      <span class="tt-key">TYPE</span>
      <span class="tt-val" id="tt-type">—</span>
    </div>
    <div class="tt-row">
      <span class="tt-key">MATERIAL</span>
      <span class="tt-val" id="tt-material">—</span>
    </div>
    <div class="tt-row">
      <span class="tt-key">CONFIDENCE</span>
      <span class="tt-val" id="tt-confidence">—</span>
    </div>
    <div class="tt-divider"></div>
    <div class="tt-source" id="tt-source">—</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="hidden">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">PROCESSING...</div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG — point this at your FastAPI endpoint
// ─────────────────────────────────────────────
const API_BASE = "http://localhost:8000/api/v1";
const API_ENDPOINT = `${API_BASE}/annotate`;
const MANUAL_ANNOTATIONS_ENDPOINT = `${API_BASE}/manual-annotations`;
const API_TIMEOUT_MS = 120000;
const USE_HARDCODED_RESPONSE = true;

const HARDCODED_ANNOTATE_RESPONSE = {
  page_count: 1,
  duct_count: 1,
  annotations: [
    {
      id: 34430,
      bbox: {
        x0: 1296,
        y0: 1192,
        x1: 1709,
        y1: 1213,
        page: 0,
      },
      label: '14"⌀',
      pressure_class: "HIGH",
      dimension: "24X18X8.62",
      material: null,
      confidence: 0.95,
      orientation: "vertical",
    },
  ],
};

// ─────────────────────────────────────────────
// SAMPLE ANNOTATIONS (used when no API / demo)
// Coordinates are in PDF points (0,0 = bottom-left)
// bbox: [x0, y0, x1, y1]
// ─────────────────────────────────────────────
const SAMPLE_ANNOTATIONS = [
  { id:"d1", label:'18"⌀', pressure_class:"HIGH", type:"Round Grease Duct",
    material:"18ga SS Double-Wall", confidence:0.95, source:"text_extraction",
    bbox:[120,680,320,700] },
  { id:"d2", label:'14"⌀', pressure_class:"HIGH", type:"Round Grease Duct",
    material:"18ga SS Double-Wall", confidence:0.95, source:"text_extraction",
    bbox:[320,680,480,700] },
  { id:"d3", label:'16"×8"', pressure_class:"LOW", type:"Rectangular Supply",
    material:"Galvanized Steel", confidence:0.90, source:"text_extraction",
    bbox:[560,620,760,640] },
  { id:"d4", label:'12"×8"', pressure_class:"LOW", type:"Rectangular Supply",
    material:"Galvanized Steel", confidence:0.90, source:"text_extraction",
    bbox:[760,620,920,640] },
  { id:"d5", label:'12"⌀', pressure_class:"LOW", type:"Round Supply",
    material:"Galvanized Steel", confidence:0.88, source:"text_extraction",
    bbox:[920,580,1060,600] },
  { id:"d6", label:'4"⌀ Exhaust', pressure_class:"LOW", type:"Round Exhaust",
    material:"Galvanized Steel", confidence:0.85, source:"text_extraction",
    bbox:[580,460,660,480] },
  { id:"d7", label:'14"×10"', pressure_class:"MEDIUM", type:"Rectangular Return",
    material:"Galvanized Steel", confidence:0.75, source:"llm_fallback",
    bbox:[200,540,420,560] },
  { id:"d8", label:'10"⌀', pressure_class:"LOW", type:"Round Supply",
    material:"Galvanized Steel", confidence:0.88, source:"text_extraction",
    bbox:[1060,580,1180,600] },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let annotations = [];
let pdfDoc = null;
let pageScale = 1;
let pdfBaseWidth = 0;
let pdfBaseHeight = 0;
let pdfRotation = 0;
let activeFilter = 'all';
let selectedAnnotationId = null;
let currentDocumentId = null;
let currentDocumentName = null;
let manualModeEnabled = false;
let manualDraft = null;
let manualDrawing = false;
let baseStatusMessage = "UPLOAD A PDF TO BEGIN";

const pressureColor = { HIGH:"#EF4444", MEDIUM:"#F59E0B", LOW:"#10B981" };
const manualColor = "#3B82F6";

// ─────────────────────────────────────────────
// PDF.js setup
// ─────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

// ─────────────────────────────────────────────
// FILE UPLOAD
// ─────────────────────────────────────────────
document.getElementById("file-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  currentDocumentName = file.name;
  showLoading("READING PDF...");
  currentDocumentId = await computeDocumentId(file);

  setStatus(`LOADED: ${file.name.toUpperCase()}`);
  document.getElementById("dropzone").classList.add("hidden");
  showLoading("RENDERING PDF...");
  await renderPDF(file);
  showLoading("FETCHING ANNOTATIONS...");
  await fetchAnnotations(file);
  showLoading("LOADING SAVED CORRECTIONS...");
  await loadManualAnnotations(false);
  hideLoading();
});

// Drag & drop
const wrap = document.getElementById("canvas-wrap");
wrap.addEventListener("dragover", e => { e.preventDefault(); });
wrap.addEventListener("drop", async e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type === "application/pdf") {
    document.getElementById("file-input").files = e.dataTransfer.files;
    document.getElementById("file-input").dispatchEvent(new Event("change"));
  }
});

const svgOverlay = document.getElementById("svg-overlay");
svgOverlay.addEventListener("mousedown", onOverlayMouseDown);
svgOverlay.addEventListener("mousemove", onOverlayMouseMove);
svgOverlay.addEventListener("mouseup", onOverlayMouseUp);
svgOverlay.addEventListener("mouseleave", onOverlayMouseLeave);

// ─────────────────────────────────────────────
// RENDER PDF
// ─────────────────────────────────────────────
async function renderPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdfDoc.getPage(1);
  const baseViewport = page.getViewport({ scale: 1, rotation: 0 });
  pdfBaseWidth = baseViewport.width;
  pdfBaseHeight = baseViewport.height;
  pdfRotation = ((page.rotate || 0) % 360 + 360) % 360;

  const viewport = page.getViewport({ scale: 1.5, rotation: pdfRotation });
  pageScale = 1.5;

  const canvas = document.getElementById("pdf-canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;

  const ctx = canvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;

  const svg = document.getElementById("svg-overlay");
  svg.setAttribute("width", viewport.width);
  svg.setAttribute("height", viewport.height);
}

// ─────────────────────────────────────────────
// FETCH ANNOTATIONS FROM API (or use sample)
// ─────────────────────────────────────────────
async function fetchAnnotations(file) {
  if (USE_HARDCODED_RESPONSE) {
    annotations = normalizeApiAnnotations(HARDCODED_ANNOTATE_RESPONSE);
    selectedAnnotationId = null;
    setBaseStatus(`HARDCODED · ${getRenderableAnnotations().length} DUCT LINES`);
    renderAnnotations();
    renderSidePanel();
    return;
  }

  try {
    const formData = new FormData();
    formData.append("file", file);
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      body: formData,
      signal: AbortSignal.timeout(API_TIMEOUT_MS)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    annotations = normalizeApiAnnotations(payload);
    selectedAnnotationId = null;
    const textOnlyCount = annotations.filter(a => a.isTextOnly).length;
    const renderableCount = getRenderableAnnotations().length;
    if (textOnlyCount > 0) {
      setBaseStatus(`API · ${renderableCount} DUCT LINES (${textOnlyCount} TEXT-ONLY LABELS HIDDEN)`);
    } else {
      setBaseStatus(`API · ${renderableCount} DUCT LINES`);
    }
  } catch (err) {
    console.error("API request failed:", err.message);
    annotations = [];
    selectedAnnotationId = null;
    setBaseStatus(`API ERROR · ${err.message}`);
  }
  renderAnnotations();
  renderSidePanel();
}

// ─────────────────────────────────────────────
// COORDINATE TRANSFORM
// PDF origin = bottom-left; Canvas origin = top-left
// ─────────────────────────────────────────────
function pdfToCanvas(x, y) {
  const rotation = ((pdfRotation % 360) + 360) % 360;
  let rx = x;
  let ry = y;

  if (rotation === 90) {
    rx = pdfBaseHeight - y;
    ry = x;
  } else if (rotation === 180) {
    rx = pdfBaseWidth - x;
    ry = pdfBaseHeight - y;
  } else if (rotation === 270) {
    rx = y;
    ry = pdfBaseWidth - x;
  }

  return {
    x: rx * pageScale,
    y: ry * pageScale
  };
}

function canvasToPdf(x, y) {
  const rx = x / pageScale;
  const ry = y / pageScale;
  const rotation = ((pdfRotation % 360) + 360) % 360;

  if (rotation === 90) {
    return { x: ry, y: pdfBaseHeight - rx };
  }
  if (rotation === 180) {
    return { x: pdfBaseWidth - rx, y: pdfBaseHeight - ry };
  }
  if (rotation === 270) {
    return { x: pdfBaseWidth - ry, y: rx };
  }
  return { x: rx, y: ry };
}

function toNumber(value) {
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function normalizeBBox(bbox) {
  if (Array.isArray(bbox) && bbox.length === 4) {
    const x0 = toNumber(bbox[0]);
    const y0 = toNumber(bbox[1]);
    const x1 = toNumber(bbox[2]);
    const y1 = toNumber(bbox[3]);
    if ([x0, y0, x1, y1].some(v => v === null)) return null;
    return [Math.min(x0, x1), Math.min(y0, y1), Math.max(x0, x1), Math.max(y0, y1)];
  }

  if (bbox && typeof bbox === "object") {
    const x0 = toNumber(bbox.x0);
    const y0 = toNumber(bbox.y0);
    const x1 = toNumber(bbox.x1);
    const y1 = toNumber(bbox.y1);
    if ([x0, y0, x1, y1].some(v => v === null)) return null;
    return [Math.min(x0, x1), Math.min(y0, y1), Math.max(x0, x1), Math.max(y0, y1)];
  }

  return null;
}

function normalizeApiAnnotations(payload) {
  const raw = Array.isArray(payload)
    ? payload
    : Array.isArray(payload?.annotations)
      ? payload.annotations
      : [];

  return raw
    .map((ann, idx) => {
      const bbox = normalizeBBox(ann?.bbox);
      if (!bbox) return null;

      const source = String(
        ann?.source || (Number(ann?.id) < 0 ? "text_extraction" : "candidate_match")
      );
      const isManual = Boolean(ann?.is_manual) || source.toLowerCase().includes("manual");

      return {
        id: ann?.id ?? `ann-${idx}`,
        label: ann?.label || ann?.dimension || "Unknown duct",
        dimension: ann?.dimension || ann?.label || "",
        pressure_class: String(ann?.pressure_class || "LOW").toUpperCase(),
        type: ann?.type || ann?.orientation || "—",
        material: ann?.material ?? null,
        confidence: Number.isFinite(Number(ann?.confidence)) ? Number(ann.confidence) : 0,
        source,
        bbox,
        orientation: ann?.orientation || "unknown",
        isManual,
        isTextOnly: Number(ann?.id) < 0 && !isManual,
      };
    })
    .filter(Boolean);
}

function isLikelyDuctDimension(dimension) {
  const value = String(dimension || "").trim().toUpperCase().replace(/\s+/g, "");
  if (!value) return false;

  const round = value.match(/^(\d{1,3}(?:\.\d+)?)⌀$/);
  if (round) {
    const diameter = Number(round[1]);
    return Number.isFinite(diameter) && diameter >= 3 && diameter <= 72;
  }

  const rect = value.match(/^(\d{1,3}(?:\.\d+)?)[X×*](\d{1,3}(?:\.\d+)?)(?:[X×*](\d{1,3}(?:\.\d+)?))?$/);
  if (rect) {
    const nums = [rect[1], rect[2], rect[3]]
      .filter(Boolean)
      .map(Number);
    return nums.length >= 2 && nums.every(n => Number.isFinite(n) && n >= 3 && n <= 96);
  }

  return false;
}

function isReasonableBBox(bbox) {
  const normalized = normalizeBBox(bbox);
  if (!normalized) return false;
  const [x0, y0, x1, y1] = normalized;
  const width = x1 - x0;
  const height = y1 - y0;
  if (width <= 0 || height <= 0) return false;
  if (pdfBaseWidth > 0 && width > (pdfBaseWidth * 0.9)) return false;
  if (pdfBaseHeight > 0 && height > (pdfBaseHeight * 0.9)) return false;
  return true;
}

function getRenderableAnnotations() {
  return annotations.filter(a =>
    !a.isTextOnly &&
    isReasonableBBox(a.bbox) &&
    (a.isManual || isLikelyDuctDimension(a.dimension))
  );
}

function bboxToCanvasRect(bbox) {
  const normalized = normalizeBBox(bbox);
  if (!normalized) return null;

  const [x0, y0, x1, y1] = normalized;
  const corners = [
    pdfToCanvas(x0, y0),
    pdfToCanvas(x1, y0),
    pdfToCanvas(x1, y1),
    pdfToCanvas(x0, y1),
  ];
  const xs = corners.map(c => c.x);
  const ys = corners.map(c => c.y);
  const minX = Math.min(...xs);
  const minY = Math.min(...ys);
  const maxX = Math.max(...xs);
  const maxY = Math.max(...ys);
  const width = maxX - minX;
  const height = maxY - minY;

  return {
    x: minX,
    y: minY,
    width,
    height,
    cx: minX + width / 2,
    cy: minY + height / 2,
  };
}

function bboxToCanvasMidline(bbox) {
  const normalized = normalizeBBox(bbox);
  if (!normalized) return null;

  const [x0, y0, x1, y1] = normalized;
  const yMid = (y0 + y1) / 2;

  const p0 = pdfToCanvas(x0, yMid);
  const p1 = pdfToCanvas(x1, yMid);

  return {
    x1: p0.x,
    y1: p0.y,
    x2: p1.x,
    y2: p1.y,
    cx: (p0.x + p1.x) / 2,
    cy: (p0.y + p1.y) / 2,
  };
}

// ─────────────────────────────────────────────
// RENDER SVG ANNOTATIONS
// ─────────────────────────────────────────────
function renderAnnotations() {
  const svg = document.getElementById("svg-overlay");
  svg.innerHTML = "";

  const visible = getRenderableAnnotations().filter(a =>
    a.isManual || activeFilter === "all" || a.pressure_class === activeFilter
  );

  visible.forEach(ann => {
    const col = ann.isManual ? manualColor : (pressureColor[ann.pressure_class] || manualColor);
    const rect = bboxToCanvasRect(ann.bbox);
    const midline = bboxToCanvasMidline(ann.bbox);
    if (!rect || !midline) return;

    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "duct-group");
    g.dataset.id = ann.id;

    // Wide invisible hit line for easier hover/click
    const hit = makeLine(midline, "rgba(0,0,0,0.001)", 16, 1);
    g.appendChild(hit);

    // Main centerline overlay
    const mainLine = makeLine(midline, col, 3, 0.95);
    if (ann.isManual) {
      mainLine.setAttribute("stroke-dasharray", "6 4");
    } else {
      mainLine.setAttribute("stroke-dasharray", "8 4");
      mainLine.style.animation = `dash-march 0.8s linear infinite`;
    }
    g.appendChild(mainLine);

    if (String(selectedAnnotationId) === String(ann.id)) {
      const mx = midline.cx;
      const my = Math.max(16, midline.cy - 10);
      const chip = makeLabel(mx, my, ann.label, col);
      g.appendChild(chip);
    }

    g.addEventListener("mouseenter", (e) => {
      showTooltip(e, ann);
    });
    g.addEventListener("mousemove", (e) => {
      moveTooltip(e);
    });
    g.addEventListener("mouseleave", () => {
      hideTooltip();
    });

    // Events
    g.addEventListener("click", async (e) => {
      e.stopPropagation();

      if (manualModeEnabled) {
        await editExistingAnnotationInManualMode(ann);
        return;
      }

      selectedAnnotationId = ann.id;
      renderAnnotations();
      renderSidePanel();
      showTooltip(e, ann);
      highlightItem(ann.id);
    });

    svg.appendChild(g);
  });

  if (manualModeEnabled && manualDraft) {
    const draftRect = draftToCanvasRect(manualDraft);
    const previewRect = makeRect(draftRect, manualColor, 1.5, 0.85, "transparent");
    previewRect.setAttribute("stroke-dasharray", "5 4");
    svg.appendChild(previewRect);

    const yMid = draftRect.y + draftRect.height / 2;
    const previewLine = makeLine(
      {
        x1: draftRect.x,
        y1: yMid,
        x2: draftRect.x + draftRect.width,
        y2: yMid,
      },
      manualColor,
      2.5,
      0.95,
    );
    previewLine.setAttribute("stroke-dasharray", "7 4");
    svg.appendChild(previewLine);
  }

  svg.onclick = () => {
    if (manualModeEnabled) return;
    selectedAnnotationId = null;
    renderAnnotations();
    renderSidePanel();
    hideTooltip();
  };
}

function makeLine({x1,y1,x2,y2}, stroke, width, opacity) {
  const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
  l.setAttribute("x1",x1); l.setAttribute("y1",y1);
  l.setAttribute("x2",x2); l.setAttribute("y2",y2);
  l.setAttribute("stroke", stroke);
  l.setAttribute("stroke-width", width);
  l.setAttribute("stroke-linecap", "round");
  l.setAttribute("opacity", opacity);
  return l;
}

function makeRect({x, y, width, height}, stroke, strokeWidth, opacity, fill = "transparent") {
  const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  r.setAttribute("x", x);
  r.setAttribute("y", y);
  r.setAttribute("width", Math.max(1, width));
  r.setAttribute("height", Math.max(1, height));
  r.setAttribute("stroke", stroke);
  r.setAttribute("stroke-width", strokeWidth);
  r.setAttribute("fill", fill);
  r.setAttribute("opacity", opacity);
  r.setAttribute("rx", 2);
  return r;
}

function makeCircle(cx, cy, r, color, opacity, fill = "transparent") {
  const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  c.setAttribute("cx", cx);
  c.setAttribute("cy", cy);
  c.setAttribute("r", Math.max(1, r));
  c.setAttribute("stroke", color);
  c.setAttribute("stroke-width", 2);
  c.setAttribute("fill", fill);
  c.setAttribute("opacity", opacity);
  return c;
}

function makeLabel(x, y, text, color) {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  const pad = 5, fs = 10;
  const tw = text.length * 6.5 + pad * 2;

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("x", x - tw/2); rect.setAttribute("y", y - fs - pad);
  rect.setAttribute("width", tw); rect.setAttribute("height", fs + pad * 2);
  rect.setAttribute("rx", 3);
  rect.setAttribute("fill", "#0a0e14cc");
  rect.setAttribute("stroke", color);
  rect.setAttribute("stroke-width", 1);
  g.appendChild(rect);

  const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
  t.setAttribute("x", x); t.setAttribute("y", y);
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("font-size", fs);
  t.setAttribute("font-family", "Share Tech Mono, monospace");
  t.setAttribute("fill", color);
  t.setAttribute("letter-spacing", "1");
  t.textContent = text;
  g.appendChild(t);

  return g;
}

// ─────────────────────────────────────────────
// SIDE PANEL
// ─────────────────────────────────────────────
function renderSidePanel() {
  const list = document.getElementById("duct-list");
  list.innerHTML = "";
  const renderable = getRenderableAnnotations();
  document.getElementById("duct-count").textContent = renderable.length;

  renderable.forEach(ann => {
    const col = ann.isManual ? manualColor : (pressureColor[ann.pressure_class] || manualColor);
    const pressureText = ann.isManual ? "MANUAL" : ann.pressure_class;
    const item = document.createElement("div");
    item.className = "duct-item";
    if (String(selectedAnnotationId) === String(ann.id)) {
      item.classList.add("active");
    }
    item.dataset.id = ann.id;
    item.innerHTML = `
      <div class="di-dot" style="background:${col}; box-shadow:0 0 5px ${col}"></div>
      <div class="di-label">${ann.isManual ? "✎ " : ""}${ann.label}</div>
      <div class="di-pressure" style="color:${col}">${pressureText}</div>
    `;
    item.addEventListener("click", () => {
      selectedAnnotationId = ann.id;
      renderAnnotations();
      renderSidePanel();
      highlightItem(ann.id);
    });
    list.appendChild(item);
  });
}

function highlightItem(id) {
  document.querySelectorAll(".duct-item").forEach(el =>
    el.classList.toggle("active", el.dataset.id === id)
  );
  // Scroll to item
  const el = document.querySelector(`.duct-item[data-id="${id}"]`);
  if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

// ─────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────
function showTooltip(e, ann) {
  const col = ann.isManual ? manualColor : (pressureColor[ann.pressure_class] || manualColor);
  const confPct = Math.round((ann.confidence || 0) * 100);
  document.getElementById("tt-label").textContent = ann.label;
  document.getElementById("tt-pressure").textContent = ann.isManual ? "MANUAL" : ann.pressure_class;
  document.getElementById("tt-pressure").style.background = col + "22";
  document.getElementById("tt-pressure").style.color = col;
  document.getElementById("tt-type").textContent = ann.type || "—";
  document.getElementById("tt-material").textContent = ann.material || "—";
  document.getElementById("tt-confidence").textContent = `${confPct}%`;
  document.getElementById("tt-source").textContent =
    `SOURCE: ${(ann.source || "").toUpperCase().replace("_"," ")}`;
  moveTooltip(e);
  document.getElementById("tooltip").classList.add("visible");
  highlightItem(ann.id);
}

function moveTooltip(e) {
  const tt = document.getElementById("tooltip");
  const W = window.innerWidth, H = window.innerHeight;
  const tw = tt.offsetWidth || 200, th = tt.offsetHeight || 140;
  let lx = e.clientX + 16, ly = e.clientY + 16;
  if (lx + tw > W - 8) lx = e.clientX - tw - 16;
  if (ly + th > H - 8) ly = e.clientY - th - 16;
  tt.style.left = lx + "px";
  tt.style.top  = ly + "px";
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

function draftToCanvasRect(draft) {
  const x0 = Math.min(draft.start.x, draft.end.x);
  const y0 = Math.min(draft.start.y, draft.end.y);
  const x1 = Math.max(draft.start.x, draft.end.x);
  const y1 = Math.max(draft.start.y, draft.end.y);

  return {
    x: x0,
    y: y0,
    width: Math.max(1, x1 - x0),
    height: Math.max(1, y1 - y0),
  };
}

function canvasRectToPdfBBox(rect) {
  const corners = [
    canvasToPdf(rect.x, rect.y),
    canvasToPdf(rect.x + rect.width, rect.y),
    canvasToPdf(rect.x + rect.width, rect.y + rect.height),
    canvasToPdf(rect.x, rect.y + rect.height),
  ];

  const xs = corners.map(p => p.x);
  const ys = corners.map(p => p.y);

  return {
    x0: Math.min(...xs),
    y0: Math.min(...ys),
    x1: Math.max(...xs),
    y1: Math.max(...ys),
    page: 0,
  };
}

function getOverlayPointFromEvent(e) {
  const rect = svgOverlay.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
  };
}

function normalizePressureClass(value) {
  const normalized = String(value || "").trim().toUpperCase();
  if (normalized === "LOW" || normalized === "MEDIUM" || normalized === "HIGH") {
    return normalized;
  }
  return "LOW";
}

function normalizeManualRectForSave(rect) {
  const minLength = 12;
  const minThickness = 8;

  if (rect.width < minLength && rect.height < minLength) {
    return null;
  }

  if (rect.width >= rect.height) {
    const yCenter = rect.y + rect.height / 2;
    const width = Math.max(rect.width, minLength);
    const height = Math.max(rect.height, minThickness);
    return {
      x: rect.x,
      y: yCenter - (height / 2),
      width,
      height,
    };
  }

  const xCenter = rect.x + rect.width / 2;
  const width = Math.max(rect.width, minThickness);
  const height = Math.max(rect.height, minLength);
  return {
    x: xCenter - (width / 2),
    y: rect.y,
    width,
    height,
  };
}

function bboxObjectFromAnnotation(ann) {
  const normalized = normalizeBBox(ann?.bbox);
  if (!normalized) return null;
  return {
    x0: normalized[0],
    y0: normalized[1],
    x1: normalized[2],
    y1: normalized[3],
    page: 0,
  };
}

function updateManualButton() {
  const btn = document.getElementById("btn-manual");
  if (!btn) return;
  btn.classList.toggle("active", manualModeEnabled);
  btn.textContent = manualModeEnabled ? "MANUAL ON" : "MANUAL OFF";
  svgOverlay.style.pointerEvents = manualModeEnabled ? "all" : "";
  svgOverlay.style.cursor = manualModeEnabled ? "crosshair" : "default";
}

function toggleManualMode() {
  manualModeEnabled = !manualModeEnabled;
  manualDraft = null;
  manualDrawing = false;
  selectedAnnotationId = null;
  updateManualButton();
  renderAnnotations();
  renderSidePanel();
  if (manualModeEnabled) {
    setStatus("MANUAL MODE · DRAG TO DRAW, RELEASE TO LABEL & SAVE");
  } else {
    setStatus(baseStatusMessage);
  }
}

function onOverlayMouseDown(e) {
  if (!manualModeEnabled) return;
  if (!pdfDoc) {
    setStatus("MANUAL MODE · LOAD A PDF FIRST");
    return;
  }
  if (e.button !== 0) return;

  manualDrawing = true;
  const pt = getOverlayPointFromEvent(e);
  manualDraft = { start: pt, end: pt };
  selectedAnnotationId = null;
  hideTooltip();
  renderAnnotations();
  e.preventDefault();
}

function onOverlayMouseMove(e) {
  if (!manualModeEnabled || !manualDrawing || !manualDraft) return;
  manualDraft.end = getOverlayPointFromEvent(e);
  renderAnnotations();
}

async function onOverlayMouseUp(e) {
  if (!manualModeEnabled || !manualDrawing || !manualDraft) return;

  manualDrawing = false;
  manualDraft.end = getOverlayPointFromEvent(e);
  const draft = manualDraft;
  manualDraft = null;
  renderAnnotations();

  await finalizeManualDraft(draft);
  e.preventDefault();
}

function onOverlayMouseLeave() {
  if (!manualDrawing) return;
  manualDrawing = false;
  manualDraft = null;
  renderAnnotations();
}

async function finalizeManualDraft(draft) {
  if (!currentDocumentId) {
    setStatus("MANUAL MODE · LOAD A PDF FIRST");
    return;
  }

  const draftRect = draftToCanvasRect(draft);
  const rect = normalizeManualRectForSave(draftRect);
  if (!rect) {
    setStatus("MANUAL MODE · DRAG A LITTLE LONGER");
    return;
  }

  const label = String(window.prompt("Enter corrected label", "") || "").trim();
  if (!label) {
    setStatus("MANUAL MODE · SAVE CANCELED");
    return;
  }

  const pressureRaw = window.prompt("Pressure class: LOW, MEDIUM, HIGH", "LOW");
  const pressureClass = normalizePressureClass(pressureRaw);
  const pdfBBox = canvasRectToPdfBBox(rect);

  const payload = {
    document_id: currentDocumentId,
    document_name: currentDocumentName,
    annotation: {
      bbox: pdfBBox,
      label,
      pressure_class: pressureClass,
      dimension: label,
      material: null,
      confidence: 1.0,
      orientation: rect.width >= rect.height ? "horizontal" : "vertical",
    },
  };

  showLoading("SAVING MANUAL CORRECTION...");
  try {
    await saveManualAnnotation(payload);
    setStatus(`MANUAL MODE · SAVED ${label}`);
  } catch (err) {
    console.error("Manual save failed:", err.message);
    setStatus(`MANUAL SAVE ERROR · ${err.message}`);
  } finally {
    hideLoading();
  }
}

async function saveManualAnnotation(payload) {
  const res = await fetch(MANUAL_ANNOTATIONS_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
    signal: AbortSignal.timeout(API_TIMEOUT_MS),
  });

  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try {
      const body = await res.json();
      if (body?.detail) detail = String(body.detail);
    } catch (_) {
      // noop
    }
    throw new Error(detail);
  }

  const savedRaw = await res.json();
  const savedAnnotations = normalizeApiAnnotations({ annotations: [savedRaw] });
  if (!savedAnnotations.length) {
    throw new Error("No annotation returned from manual save API");
  }

  const saved = savedAnnotations[0];
  annotations = [
    ...annotations.filter(a => !(a.isManual && String(a.id) === String(saved.id))),
    saved,
  ];

  renderAnnotations();
  renderSidePanel();

  const manualCount = annotations.filter(a => a.isManual).length;
  setBaseStatus(`API · ${getRenderableAnnotations().length} DUCT LINES (${manualCount} MANUAL SAVED)`);
  return saved;
}

async function updateManualAnnotation(annotationId, annotation) {
  const res = await fetch(`${MANUAL_ANNOTATIONS_ENDPOINT}/${encodeURIComponent(annotationId)}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ annotation }),
    signal: AbortSignal.timeout(API_TIMEOUT_MS),
  });

  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try {
      const body = await res.json();
      if (body?.detail) detail = String(body.detail);
    } catch (_) {
      // noop
    }
    throw new Error(detail);
  }

  const savedRaw = await res.json();
  const savedAnnotations = normalizeApiAnnotations({ annotations: [savedRaw] });
  if (!savedAnnotations.length) {
    throw new Error("No annotation returned from manual update API");
  }

  const saved = savedAnnotations[0];
  annotations = [
    ...annotations.filter(a => !(a.isManual && String(a.id) === String(saved.id))),
    saved,
  ];

  renderAnnotations();
  renderSidePanel();

  const manualCount = annotations.filter(a => a.isManual).length;
  setBaseStatus(`API · ${getRenderableAnnotations().length} DUCT LINES (${manualCount} MANUAL SAVED)`);
  return saved;
}

async function editExistingAnnotationInManualMode(ann) {
  if (!currentDocumentId) {
    setStatus("MANUAL MODE · LOAD A PDF FIRST");
    return;
  }

  const defaultLabel = String(ann?.dimension || ann?.label || "").trim();
  const label = String(window.prompt("Enter corrected label", defaultLabel) || "").trim();
  if (!label) {
    setStatus("MANUAL MODE · SAVE CANCELED");
    return;
  }

  const pressureRaw = window.prompt(
    "Pressure class: LOW, MEDIUM, HIGH",
    String(ann?.pressure_class || "LOW"),
  );
  const pressureClass = normalizePressureClass(pressureRaw);

  const bbox = bboxObjectFromAnnotation(ann);
  if (!bbox) {
    setStatus("MANUAL MODE · INVALID ANNOTATION BBOX");
    return;
  }

  const annotationPayload = {
    bbox,
    label,
    pressure_class: pressureClass,
    dimension: label,
    material: ann?.material ?? null,
    confidence: 1.0,
    orientation: ann?.orientation || "horizontal",
  };

  showLoading("SAVING MANUAL CORRECTION...");
  try {
    const manualId = Number(ann?.id);
    if (ann?.isManual && Number.isFinite(manualId)) {
      await updateManualAnnotation(manualId, annotationPayload);
      setStatus(`MANUAL MODE · UPDATED ${label}`);
    } else {
      await saveManualAnnotation({
        document_id: currentDocumentId,
        document_name: currentDocumentName,
        annotation: annotationPayload,
      });
      setStatus(`MANUAL MODE · SAVED ${label}`);
    }
  } catch (err) {
    console.error("Manual edit failed:", err.message);
    setStatus(`MANUAL SAVE ERROR · ${err.message}`);
  } finally {
    hideLoading();
  }
}

async function loadManualAnnotations(showFeedback = true) {
  if (!currentDocumentId) {
    if (showFeedback) {
      setStatus("UPLOAD A PDF FIRST TO LOAD SAVED CORRECTIONS");
    }
    return [];
  }

  try {
    const res = await fetch(`${MANUAL_ANNOTATIONS_ENDPOINT}/${encodeURIComponent(currentDocumentId)}`, {
      method: "GET",
      signal: AbortSignal.timeout(API_TIMEOUT_MS),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const payload = await res.json();
    const manualAnnotations = normalizeApiAnnotations(payload);
    annotations = [
      ...annotations.filter(a => !a.isManual),
      ...manualAnnotations,
    ];

    renderAnnotations();
    renderSidePanel();

    setBaseStatus(`API · ${getRenderableAnnotations().length} DUCT LINES (${manualAnnotations.length} MANUAL SAVED)`);
    if (manualModeEnabled && showFeedback) {
      setStatus(`MANUAL MODE · LOADED ${manualAnnotations.length} SAVED`);
    }

    return manualAnnotations;
  } catch (err) {
    console.error("Manual reload failed:", err.message);
    if (showFeedback) {
      setStatus(`MANUAL LOAD ERROR · ${err.message}`);
    }
    return [];
  }
}

async function reloadManualAnnotations() {
  showLoading("LOADING SAVED CORRECTIONS...");
  try {
    await loadManualAnnotations(true);
  } finally {
    hideLoading();
  }
}

// ─────────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────────
function filterDucts(f) {
  activeFilter = f;
  ["all","LOW","MEDIUM","HIGH"].forEach(k => {
    const btn = document.getElementById("btn-" + k.toLowerCase());
    if (btn) btn.classList.toggle("active", k === f);
  });
  renderAnnotations();
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function setBaseStatus(msg) {
  baseStatusMessage = msg;
  if (!manualModeEnabled) {
    setStatus(msg);
  }
}

async function computeDocumentId(file) {
  const fallback = `${file.name}:${file.size}:${file.lastModified}`;
  if (!window.crypto || !window.crypto.subtle) {
    return fallback;
  }

  try {
    const buffer = await file.arrayBuffer();
    const digest = await window.crypto.subtle.digest("SHA-256", buffer);
    const bytes = new Uint8Array(digest);
    return Array.from(bytes).map(v => v.toString(16).padStart(2, "0")).join("");
  } catch (err) {
    console.warn("Could not compute SHA-256 document hash, using fallback id", err);
    return fallback;
  }
}

function setStatus(msg) {
  document.getElementById("status-bar").textContent = msg;
}
function showLoading(msg) {
  document.getElementById("loading-text").textContent = msg;
  document.getElementById("loading").classList.remove("hidden");
}
function hideLoading() {
  document.getElementById("loading").classList.add("hidden");
}

// ─────────────────────────────────────────────
// DEMO: auto-load sample annotations on page load
// (no PDF rendered — just shows the panel populated)
// ─────────────────────────────────────────────
window.addEventListener("load", () => {
  annotations = [];
  document.getElementById("duct-count").textContent = "0";
  updateManualButton();
  renderSidePanel();
  setBaseStatus("UPLOAD A PDF TO BEGIN");
});
